function Card({children,color=N.cyan,style={},animate=false}){
  return <div style={{background:'rgba(0,0,0,0.6)',border:`1px solid ${color}`,borderRadius:12,

    animation:animate?'neon-pulse 2s ease-in-out infinite':'none',...style}}>{children}</div>;
}
function NBtn({children,onClick,color=N.pink,full=false,small=false,style={},disabled=false}){
  return <button onClick={onClick} disabled={disabled} style={{
    background:`${color}22`,border:`2px solid ${color}`,borderRadius:8,color,
    fontFamily:"'Orbitron',sans-serif",fontSize:small?10:13,fontWeight:700,

function Ring({pct,size=210,stroke=10,color=N.green}){
  const r=(size-stroke)/2,circ=2*Math.PI*r;
  return(
    <svg width={size} height={size} style={{transform:'rotate(-90deg)',position:'absolute',top:0,left:0}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={circ*(1-Math.max(pct,0))}
        style={{transition:'stroke-dashoffset 1s linear,stroke 0.4s'}}/>
    </svg>
  );
}

function AuthScreen(){
  const [mode,setMode]=useState('signin');
  const [email,setEmail]=useState('');
  const [password,setPass]=useState('');
  const [username,setUser]=useState('');
  const [error,setError]=useState('');
  const [loading,setLoading]=useState(false);
  const isSignUp=mode==='signup';

  const signIn=async()=>{
    setLoading(true);setError('');
    const {error:e}=await sb.auth.signInWithPassword({email,password});
    if(e)setError(e.message);
    setLoading(false);
  };
  const signUp=async()=>{
    setLoading(true);setError('');
    if(!username.trim()){setError('Please enter a username');setLoading(false);return;}
    if(password.length<6){setError('Password must be 6+ characters');setLoading(false);return;}
    const uname=username.trim().toUpperCase();
    const {data:existing}=await sb.from('profiles').select('id').eq('username',uname).maybeSingle();
    if(existing){setError('Username taken — try another');setLoading(false);return;}
    localStorage.setItem('hl_pending_username',uname);
    const {error:e}=await sb.auth.signUp({email,password});
    if(e){setError(e.message);setLoading(false);return;}
    setError('✓ Check your email and click the confirmation link!');
    setLoading(false);
  };

  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{textAlign:'center',marginBottom:36,animation:'slide-up 0.8s ease'}}>
        <div style={{display:'flex',justifyContent:'center',marginBottom:16,transform:'scale(1.2)',transformOrigin:'center center'}}>
          <PouchCan isReady={true} timerColor={N.cyan} pct={1} hideReady={true}/>
        </div>
        <div style={{fontFamily:"'VT323',monospace",fontSize:28,color:N.yellow,textShadow:glow(N.yellow,10),letterSpacing:4,marginTop:20}}>
          YOUR HABIT. YOUR RULES.
        </div>
      </div>
      <Card color={N.cyan} style={{width:'100%',maxWidth:340}} animate>
        <div style={{display:'flex',gap:4,background:'rgba(0,0,0,0.4)',borderRadius:8,padding:4,marginBottom:16}}>
          {['signin','signup'].map(m=>(
            <button key={m} onClick={()=>{setMode(m);setError('');}}
              style={{flex:1,padding:8,border:'none',borderRadius:6,cursor:'pointer',
                background:mode===m?`${N.cyan}22`:'transparent',color:mode===m?N.cyan:'#444',
                fontFamily:"'Orbitron',sans-serif",fontSize:11,fontWeight:700,
                textShadow:mode===m?glow(N.cyan,6):'none'}}>
              {m==='signin'?'SIGN IN':'SIGN UP'}
            </button>
          ))}
        </div>
        {isSignUp&&(
          <div style={{marginBottom:10}}>
            <VT color="#666" size={13} style={{marginBottom:6}}>USERNAME</VT>
            <NInput value={username} onChange={e=>setUser(e.target.value)} placeholder="e.g. NEON_WOLF" color={N.cyan} style={{textTransform:'uppercase'}}/>
          </div>
        )}
        <div style={{marginBottom:10}}>
          <VT color="#666" size={13} style={{marginBottom:6}}>EMAIL</VT>
          <NInput value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@email.com" type="email" color={N.cyan}/>
        </div>
        <div style={{marginBottom:16}}>
          <VT color="#666" size={13} style={{marginBottom:6}}>PASSWORD</VT>
          <NInput value={password} onChange={e=>setPass(e.target.value)} placeholder="••••••••" type="password" color={N.cyan}/>
        </div>
        {error&&<div style={{fontFamily:"'VT323',monospace",fontSize:15,marginBottom:12,textAlign:'center',color:error.startsWith('✓')?N.green:N.pink}}>{error}</div>}
        {loading
          ?<div style={{display:'flex',justifyContent:'center',padding:12}}><div className="spinner"/></div>
          :<NBtn onClick={isSignUp?signUp:signIn} color={N.pink} full>{isSignUp?'CREATE ACCOUNT →':'ENTER THE GRID →'}</NBtn>
        }
      </Card>
    </div>
  );
}

function MainApp({session,profile}){
  const [tab,setTab]=useState('today');
  const [logs,setLogs]=useState([]);
  const [brands,setBrands]=useState([]);
  const [settings,setSettings]=useState({daily_goal:10,daily_spend_limit:5,interval_minutes:60});
  const [timerStart,setTimerStart]=useState(null);
  const [now,setNow]=useState(Date.now());
  const [showLog,setShowLog]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [leaderboard,setLeaderboard]=useState([]);
  const [trashTalks,setTrashTalks]=useState({});
  const [trashInputs,setTrashInputs]=useState({});
  const [expandedUser,setExpandedUser]=useState(null);
  const [logForm,setLogForm]=useState({type:TYPES[0],brandId:'',mg:'',cost:'',note:''});
  const [newBrand,setNewBrand]=useState({name:'',mg:'',pricePerUnit:'',type:TYPES[0]});
  const [editSettings,setEditSettings]=useState(null);
  const [pulse,setPulse]=useState(false);
  const [dataLoading,setDataLoading]=useState(true);

  useEffect(()=>{
    const uid=session.user.id;
    Promise.all([
      sb.from('logs').select('*').eq('user_id',uid).order('logged_at',{ascending:false}),
      sb.from('brands').select('*').eq('user_id',uid).order('created_at'),
      sb.from('settings').select('*').eq('user_id',uid).single(),
    ]).then(([l,b,s])=>{
      setLogs(l.data||[]);
      setBrands(b.data||[]);
      if(s.data)setSettings(s.data);
      setDataLoading(false);
    });
  },[session]);

  useEffect(()=>{const t=setInterval(()=>setNow(Date.now()),1000);return()=>clearInterval(t);},[]);

  const intervalMs=(settings.interval_minutes||60)*60*1000;
  const elapsedMs=timerStart?now-timerStart:intervalMs;
  const remainingMs=Math.max(intervalMs-elapsedMs,0);
  const timerPct=timerStart?Math.min(elapsedMs/intervalMs,1):1;
  const timerReady=timerPct>=1;
  const timerMins=Math.floor(remainingMs/60000);
  const timerSecs=Math.floor((remainingMs%60000)/1000);
  const timerColor=timerReady?N.green:timerPct>0.6?N.yellow:N.pink;
  const today=todayKey();
  const todayLogs=logs.filter(l=>l.logged_at.startsWith(today));
  const todayCount=todayLogs.length;
  const todaySpend=todayLogs.reduce((a,l)=>a+(l.cost||0),0);
  const pctGoal=Math.min(todayCount/(settings.daily_goal||10),1);
  const pctSpend=settings.daily_spend_limit>0?Math.min(todaySpend/settings.daily_spend_limit,1):0;
  const statusColor=todayCount===0?N.green:pctGoal<0.7?N.green:pctGoal<1?N.yellow:N.pink;
  const days=getLast7();
  const max7=Math.max(...days.map(d=>logs.filter(l=>l.logged_at.startsWith(d)).length),settings.daily_goal||10,1);

  const logUse=async()=>{
    const brand=brands.find(b=>b.id===logForm.brandId);
    const cost=logForm.cost!==''?+logForm.cost:brand?brand.price_per_unit:0;
    const mg=logForm.mg!==''?+logForm.mg:brand?brand.mg:null;
    const entry={user_id:session.user.id,logged_at:new Date().toISOString(),
      type:brand?brand.type:logForm.type,brand_name:brand?brand.name:null,
      mg,cost:+cost||0,note:logForm.note||null};
    const {data}=await sb.from('logs').insert(entry).select().single();
    if(data){setLogs(p=>[data,...p]);setTimerStart(Date.now());
      setPulse(true);setTimeout(()=>setPulse(false),400);
      setShowLog(false);setLogForm({type:TYPES[0],brandId:'',mg:'',cost:'',note:''});}
  };

  const undoLast=async()=>{
    if(!todayLogs.length)return;
    const last=todayLogs[0];
    await sb.from('logs').delete().eq('id',last.id);
    setLogs(p=>p.filter(l=>l.id!==last.id));
  };

  const addBrand=async()=>{
    if(!newBrand.name)return;
    const {data}=await sb.from('brands').insert({user_id:session.user.id,name:newBrand.name,
      mg:+newBrand.mg||0,price_per_unit:+newBrand.pricePerUnit||0,type:newBrand.type}).select().single();
    if(data){setBrands(p=>[...p,data]);setNewBrand({name:'',mg:'',pricePerUnit:'',type:TYPES[0]});}
  };

  const deleteBrand=async(id)=>{
    await sb.from('brands').delete().eq('id',id);
    setBrands(p=>p.filter(b=>b.id!==id));
  };

  const saveSettings=async()=>{
    const s={user_id:session.user.id,daily_goal:+editSettings.daily_goal||10,
      daily_spend_limit:+editSettings.daily_spend_limit||0,
      interval_minutes:+editSettings.interval_minutes||60,updated_at:new Date().toISOString()};
    await sb.from('settings').upsert(s);
    setSettings(s);setShowSettings(false);
  };

  const signOut=async()=>{await sb.auth.signOut();};

  const fetchLeaderboard=async()=>{
    if(!window.storage)return;
    try{
      const r=await window.storage.list('lb:',true);
      const keys=r?.keys||[];
      const entries=await Promise.all(keys.map(k=>window.storage.get(k,true).then(r=>r?JSON.parse(r.value):null).catch(()=>null)));
      setLeaderboard(entries.filter(Boolean).filter(e=>Date.now()-e.lastSeen<7*24*60*60*1000)
        .sort((a,b)=>(a.todayCount/(a.todayGoal||10))-(b.todayCount/(b.todayGoal||10))));
    }catch{}
  };

  const fetchTrashTalks=async()=>{
    if(!window.storage||!profile)return;
    try{
      const r=await window.storage.list('tt:',true);
      const keys=r?.keys||[];
      const entries=await Promise.all(keys.map(async k=>{
        const v=await window.storage.get(k,true).catch(()=>null);
        if(!v)return null;
        return{target:k.replace('tt:',''),data:JSON.parse(v.value)};
      }));
      const map={};
      entries.filter(Boolean).forEach(({target,data})=>{map[target]=data;});
      setTrashTalks(map);
    }catch{}
  };

  useEffect(()=>{if(tab==='crew'){fetchLeaderboard();fetchTrashTalks();}},[tab]);

  const generateTrashTalk=async(targetUsername)=>{
    const targetData=leaderboard.find(p=>p.username===targetUsername);
    if(!targetData)return;
    setTrashTalks(p=>({...p,[targetUsername]:{text:'',loading:true}}));
    try{
      const myData=leaderboard.find(p=>p.username===profile.username);
      const prompt=`You are a hilarious trash-talking scoreboard announcer for a nicotine reduction app called HITLIST. Generate ONE short savage funny trash talk (max 2 sentences, 80s arcade vibe) from "${profile.username}" to "${targetUsername}". Stats: ${profile.username}: ${myData?.todayCount||0}/${myData?.todayGoal||10} uses. ${targetUsername}: ${targetData.todayCount}/${targetData.todayGoal} uses, $${targetData.todaySpend?.toFixed(2)||'0.00'} spent. Context: "${trashInputs[targetUsername]||'just roast them'}". Rules: fun not mean, 80s arcade energy, ALL CAPS key phrases, max 2 sentences.`;
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
          messages:[{role:'user',content:prompt}]})});
      const d=await res.json();
      const text=d.content?.map(c=>c.text||'').join('')||'ROAST.EXE FAILED';
      await window.storage?.set(`tt:${targetUsername}`,JSON.stringify({from:profile.username,text,timestamp:Date.now()}),true).catch(()=>{});
      setTrashTalks(p=>({...p,[targetUsername]:{text,loading:false,from:profile.username}}));
    }catch{
      setTrashTalks(p=>({...p,[targetUsername]:{text:'SYSTEM ERROR: ROAST.EXE CRASHED',loading:false}}));
    }
  };

  if(dataLoading)return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh'}}>
      <div className="spinner"/>
    </div>
  );

  const TABS=[{id:'today',label:'TODAY'},{id:'week',label:'WEEK'},{id:'log',label:'LOG'},{id:'brands',label:'GEAR'},{id:'crew',label:'CREW'}];

  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'16px 16px 90px'}}>
      {/* HEADER */}
      <div style={{width:'100%',maxWidth:420,display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div>
          <div style={{fontSize:28,fontWeight:900,color:N.pink,lineHeight:1}}>HIT<span style={{color:N.cyan}}>LIST</span></div>
          <VT color={N.yellow} size={14} style={{textShadow:glow(N.yellow,6),letterSpacing:3,marginTop:2}}>{profile?.username} ▮</VT>
        </div>
        <button onClick={()=>{setEditSettings({...settings});setShowSettings(true);}}
          style={{background:'transparent',border:`1px solid ${N.purple}66`,borderRadius:8,
            color:N.purple,padding:'8px 10px',cursor:'pointer',fontSize:16,textShadow:glow(N.purple,6)}}>⚙</button>
      </div>

      {/* TABS */}
      <div style={{display:'flex',gap:4,background:'rgba(0,0,0,0.6)',border:`1px solid ${N.cyan}33`,borderRadius:10,padding:4,marginBottom:20,width:'100%',maxWidth:420}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} className={`tab-btn${tab===t.id?' tab-active':''}`}

              color:'#444',fontSize:9,fontFamily:"'Orbitron',sans-serif",fontWeight:700,letterSpacing:0.5}}>
            {t.label}
          </button>
        ))}
      </div>

      <div style={{width:'100%',maxWidth:420}}>

        {tab==='today'&&(
          <div style={{animation:'slide-up 0.4s ease'}}>
            <Card color={timerColor} animate={timerReady} style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'24px 16px 20px'}}>
              <VT color={timerColor} size={13} style={{textShadow:glow(timerColor,6),marginBottom:18}}>NEXT USE COUNTDOWN</VT>
              <div style={{position:'relative',width:210,height:210,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:12}}>
                <Ring pct={timerPct} color={timerColor}/>
                {!timerReady&&(
                  <div style={{position:'absolute',top:14,left:0,right:0,textAlign:'center',zIndex:2,
                    fontFamily:"'VT323',monospace",fontSize:24,color:timerColor,textShadow:glow(timerColor,8)}}>
                    {timerMins}:{String(timerSecs).padStart(2,'0')}
                  </div>
                )}
                <div style={{position:'relative',zIndex:3,marginTop:16}}>
                  <PouchCan isReady={timerReady} timerColor={timerColor} pct={timerPct}/>
                </div>

            </Card>

            <div style={{display:'flex',gap:10,marginBottom:12}}>

                <VT color="#555" size={14} style={{marginTop:4}}>OF {settings.daily_goal||10} GOAL</VT>
                <div style={{background:'rgba(255,255,255,0.05)',borderRadius:4,height:5,marginTop:10,overflow:'hidden'}}>
                  <div style={{height:'100%',borderRadius:4,width:`${pctGoal*100}%`,background:statusColor,transition:'width 0.4s'}}/>
                </div>
              </Card>
              <Card color={pctSpend>=1?N.pink:N.yellow} style={{flex:1,textAlign:'center',marginBottom:0}}>
                <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:28,fontWeight:900,lineHeight:1,
                  color:pctSpend>=1?N.pink:N.yellow,textShadow:glow(pctSpend>=1?N.pink:N.yellow,15)}}>
                  {fmtMoney(todaySpend)}
                </div>
                <VT color="#555" size={14} style={{marginTop:4}}>{settings.daily_spend_limit>0?`OF ${fmtMoney(settings.daily_spend_limit)}`:'SPENT'}</VT>
                {settings.daily_spend_limit>0&&(
                  <div style={{background:'rgba(255,255,255,0.05)',borderRadius:4,height:5,marginTop:10,overflow:'hidden'}}>
                    <div style={{height:'100%',borderRadius:4,width:`${pctSpend*100}%`,background:pctSpend>=1?N.pink:N.yellow,transition:'width 0.4s'}}/>

            {todayLogs.some(l=>l.mg)&&(

              background:pulse?`${N.pink}33`:`${N.pink}11`,color:N.pink,fontFamily:"'Orbitron',sans-serif",
              fontSize:16,fontWeight:900,cursor:'pointer',letterSpacing:2,textShadow:glow(N.pink,10),
              boxShadow:`0 0 20px ${N.pink}44`,transform:pulse?'scale(0.97)':'scale(1)',transition:'all 0.15s',marginBottom:10}}>

            {todayLogs.length>0&&(

              <div style={{display:'flex',gap:6,alignItems:'flex-end',height:120,marginBottom:8}}>
                {days.map(d=>{
                  const cnt=logs.filter(l=>l.logged_at.startsWith(d)).length;
                  const h=cnt===0?4:Math.round((cnt/max7)*110);
                  const over=cnt>(settings.daily_goal||10);
                  const col=cnt===0?'#1a1a2e':over?N.pink:d===today?N.green:N.cyan;
                  return(<div key={d} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                    <div style={{fontSize:10,color:col,fontFamily:"'VT323',monospace"}}>{cnt||''}</div>
                    <div style={{width:'100%',height:h,borderRadius:'4px 4px 0 0',background:col,boxShadow:`0 0 8px ${col}88`}}/>

              <div style={{display:'flex',gap:6,marginBottom:20}}>
                {days.map(d=>(<div key={d} style={{flex:1,textAlign:'center',fontSize:10,fontFamily:"'VT323',monospace",color:d===today?'#e8e8f0':'#444'}}>{fmtDay(d)}</div>))}
              </div>
              {(()=>{
                const maxS=Math.max(...days.map(d=>logs.filter(l=>l.logged_at.startsWith(d)).reduce((a,l)=>a+(l.cost||0),0)),settings.daily_spend_limit||0,0.01);
                return(<>
                  <VT color={N.yellow} size={13} style={{textShadow:glow(N.yellow,6),marginBottom:12}}>SPEND — LAST 7 DAYS</VT>
                  <div style={{display:'flex',gap:6,alignItems:'flex-end',height:70,marginBottom:8}}>
                    {days.map(d=>{
                      const sp=logs.filter(l=>l.logged_at.startsWith(d)).reduce((a,l)=>a+(l.cost||0),0);
                      const h=sp===0?4:Math.round((sp/maxS)*60);
                      const over=settings.daily_spend_limit>0&&sp>settings.daily_spend_limit;
                      const col=sp===0?'#1a1a2e':over?N.pink:d===today?N.yellow:N.orange;
                      return(<div key={d} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                        <div style={{fontSize:9,color:col,fontFamily:"'VT323',monospace"}}>{sp>0?`$${sp.toFixed(1)}`:''}</div>
                        <div style={{width:'100%',height:h,borderRadius:'4px 4px 0 0',background:col,boxShadow:`0 0 6px ${col}88`}}/>
                      </div>);
                    })}
                  </div>
                </>);
              })()}
              <div style={{borderTop:`1px solid ${N.cyan}33`,paddingTop:16,marginTop:8,display:'flex',justifyContent:'space-between',textAlign:'center'}}>
                {[['USES',days.reduce((a,d)=>a+logs.filter(l=>l.logged_at.startsWith(d)).length,0),N.cyan],
                  ['AVG',(days.reduce((a,d)=>a+logs.filter(l=>l.logged_at.startsWith(d)).length,0)/7).toFixed(1),N.purple],
                  ['MG',days.reduce((a,d)=>a+logs.filter(l=>l.logged_at.startsWith(d)).reduce((b,l)=>b+(l.mg||0),0),0),N.green],
                  ['$',fmtMoney(days.reduce((a,d)=>a+logs.filter(l=>l.logged_at.startsWith(d)).reduce((b,l)=>b+(l.cost||0),0),0)),N.yellow],
                ].map(([l,v,c])=>(<div key={l}>
                  <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:18,fontWeight:700,color:c,textShadow:glow(c,8)}}>{v}</div>
                  <VT color="#555" size={12}>{l}</VT>
                </div>))}
              </div>
            </Card>
          </div>
        )}

        {tab==='log'&&(
          <div style={{animation:'slide-up 0.4s ease'}}>
            <VT color={N.cyan} size={13} style={{textShadow:glow(N.cyan,6),marginBottom:12}}>TODAY'S ENTRIES</VT>
            {todayLogs.length===0
              ?<Card color="#333" style={{textAlign:'center',padding:32}}><VT color="#444" size={18} style={{letterSpacing:3}}>NO ENTRIES YET</VT></Card>
              :todayLogs.map((e,i)=>(
                <Card key={e.id||i} color={N.purple} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div>
                    <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:13,color:N.purple,textShadow:glow(N.purple,6)}}>{e.brand_name||e.type}</div>
                    <div style={{fontFamily:"'VT323',monospace",fontSize:14,color:'#666',marginTop:4,display:'flex',gap:12}}>
                      {e.mg?<span style={{color:N.cyan}}>{e.mg}mg</span>:null}
                      {e.cost?<span style={{color:N.yellow}}>{fmtMoney(e.cost)}</span>:null}
                      {e.note?<span style={{fontStyle:'italic',color:'#555'}}>"{e.note}"</span>:null}
                    </div>
                  </div>
                  <VT color="#444" size={14}>{fmtTime(e.logged_at)}</VT>
                </Card>
              ))
            }
          </div>
        )}

        {tab==='brands'&&(
          <div style={{animation:'slide-up 0.4s ease'}}>
            <VT color={N.yellow} size={13} style={{textShadow:glow(N.yellow,6),marginBottom:12}}>YOUR GEAR</VT>
            {brands.map(b=>(
              <Card key={b.id} color={N.yellow} style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:14,fontWeight:700,color:N.yellow,textShadow:glow(N.yellow,6)}}>{b.name}</div>
                  <VT color="#666" size={14} style={{marginTop:3}}>{b.type} · {b.mg}mg · {fmtMoney(b.price_per_unit)}/unit</VT>
                </div>
                <button onClick={()=>deleteBrand(b.id)} style={{background:'transparent',border:'none',color:N.pink,fontSize:20,cursor:'pointer',textShadow:glow(N.pink,6)}}>×</button>
              </Card>
            ))}
            <Card color={N.green} style={{marginTop:8}}>
              <VT color={N.green} size={13} style={{textShadow:glow(N.green,6),marginBottom:12}}>ADD GEAR</VT>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                <NInput placeholder="Brand name (e.g. ZYN 6mg)" value={newBrand.name} onChange={e=>setNewBrand(p=>({...p,name:e.target.value}))} color={N.green}/>
                <div style={{display:'flex',gap:8}}>
                  <NInput placeholder="mg" type="number" value={newBrand.mg} onChange={e=>setNewBrand(p=>({...p,mg:e.target.value}))} color={N.green} style={{width:'50%'}}/>
                  <NInput placeholder="$/unit" type="number" value={newBrand.pricePerUnit} onChange={e=>setNewBrand(p=>({...p,pricePerUnit:e.target.value}))} color={N.green} style={{width:'50%'}}/>
                </div>
                <select value={newBrand.type} onChange={e=>setNewBrand(p=>({...p,type:e.target.value}))}
                  style={{width:'100%',background:'rgba(0,0,0,0.7)',border:`1px solid ${N.green}88`,borderRadius:8,
                    color:'#e8e8f0',fontSize:16,padding:'10px 12px',fontFamily:"'VT323',monospace",outline:'none'}}>
                  {TYPES.map(t=><option key={t} value={t}>{t}</option>)}
                </select>
                <NBtn onClick={addBrand} color={N.green} full>SAVE GEAR</NBtn>
              </div>
            </Card>
          </div>
        )}

        {tab==='crew'&&(
          <div style={{animation:'slide-up 0.4s ease'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <VT color={N.pink} size={13} style={{textShadow:glow(N.pink,6)}}>THE CREW</VT>
              <NBtn onClick={()=>{fetchLeaderboard();fetchTrashTalks();}} color={N.cyan} small>↻ REFRESH</NBtn>
            </div>
            <Card color={N.purple} style={{marginBottom:16}}>
              <VT color={N.purple} size={14} style={{textShadow:glow(N.purple,6),marginBottom:8}}>HOW TO ADD FRIENDS</VT>
              <VT color="#666" size={14} style={{lineHeight:1.6}}>
                1. SHARE YOUR APP URL WITH YOUR CREW<br/>
                2. EVERYONE SIGNS UP WITH A UNIQUE HANDLE<br/>
                3. YOU'LL ALL APPEAR HERE AUTOMATICALLY<br/>
                4. RANKED BY WHO'S CLOSEST TO THEIR GOAL
              </VT>
              <div style={{marginTop:10,fontFamily:"'Orbitron',sans-serif",fontSize:11,color:N.yellow,textShadow:glow(N.yellow,4)}}>YOUR HANDLE: {profile?.username}</div>
            </Card>
            {leaderboard.length===0
              ?<Card color="#333" style={{textAlign:'center',padding:32}}>
                <VT color="#444" size={16} style={{letterSpacing:3,lineHeight:1.8}}>NO CREW YET<br/><span style={{fontSize:12,color:'#333'}}>SHARE THE APP TO SEE FRIENDS</span></VT>
              </Card>
              :leaderboard.map((p,i)=>{
                const pct=p.todayCount/(p.todayGoal||10);
                const isMe=p.username===profile?.username;
                const rankColor=i===0?N.yellow:i===1?'#c0c0c0':i===2?'#cd7f32':N.cyan;
                const statusTxt=pct===0?'CLEAN':pct<=0.5?'CRUSHING IT':pct<=1?'ON TRACK':'OVER LIMIT';
                const statusCol=pct===0?N.green:pct<=0.5?N.green:pct<=1?N.yellow:N.pink;
                const talk=trashTalks[p.username];
                const isExpanded=expandedUser===p.username;
                return(
                  <Card key={p.username} color={isMe?N.pink:rankColor} animate={isMe}>
                    <div style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer'}}
                      onClick={()=>setExpandedUser(isExpanded?null:p.username)}>

                        {i<3?MEDAL[i]:`#${i+1}`}
                      </div>
                      <div style={{flex:1}}>
                        <div style={{display:'flex',alignItems:'center',gap:8}}>
                          <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:13,fontWeight:700,
                            color:isMe?N.pink:'#e8e8f0',textShadow:isMe?glow(N.pink,8):'none'}}>{p.username}</div>
                          {isMe&&<div style={{fontFamily:"'VT323',monospace",fontSize:11,color:N.pink,
                            border:`1px solid ${N.pink}66`,borderRadius:4,padding:'1px 5px'}}>YOU</div>}
                        </div>
                        <div style={{background:'rgba(255,255,255,0.05)',borderRadius:3,height:4,marginTop:6,overflow:'hidden',maxWidth:160}}>
                          <div style={{height:'100%',borderRadius:3,width:`${Math.min(pct,1)*100}%`,background:statusCol,transition:'width 0.4s'}}/>
                        </div>
                        <VT color="#555" size={12} style={{marginTop:3}}>{p.todayCount}/{p.todayGoal} today · {p.weekTotal} this week</VT>

                      <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>
                        <VT color={statusCol} size={12} style={{textShadow:glow(statusCol,4),letterSpacing:1}}>{statusTxt}</VT>

                            <VT color={N.pink} size={11} style={{marginBottom:6}}>📢 INCOMING FROM {talk.from}</VT>

                        <VT color={N.orange} size={11} style={{marginBottom:8}}>🔥 SEND TRASH TALK TO {p.username}</VT>
                        <NInput placeholder="Give context... or just hit FIRE"

                        {talk&&talk.from!==profile?.username
                          ?<div style={{background:'rgba(255,45,120,0.1)',border:`1px solid ${N.pink}44`,borderRadius:8,padding:'12px 14px'}}>
                            <VT color={N.pink} size={11} style={{marginBottom:8}}>📢 {talk.from} SENT YOU A ROAST:</VT>
                            <VT color="#e8e8f0" size={16} style={{lineHeight:1.5}}>{talk.text}</VT>
                          </div>
                          :<VT color="#333" size={14} style={{textAlign:'center',letterSpacing:2}}>NO ROASTS YET... YOU'RE SAFE</VT>
                        }
                      </div>

          <div style={{background:'#08080f',border:`1px solid ${N.pink}66`,borderRadius:'20px 20px 0 0',
            boxShadow:`0 -10px 40px ${N.pink}22`,padding:'24px 20px 40px',width:'100%',maxWidth:440,animation:'slide-up 0.3s ease'}}>
            <VT color={N.pink} size={13} style={{textShadow:glow(N.pink,6),marginBottom:16}}>LOG A USE</VT>
            <div style={{marginBottom:10}}>
              <VT color="#666" size={13} style={{marginBottom:6}}>BRAND</VT>
              <select value={logForm.brandId} onChange={e=>setLogForm(p=>({...p,brandId:e.target.value}))}
                style={{width:'100%',background:'rgba(0,0,0,0.8)',border:`1px solid ${N.pink}66`,borderRadius:8,
                  color:'#e8e8f0',fontSize:16,padding:'10px 12px',fontFamily:"'VT323',monospace",outline:'none'}}>
                <option value="">— Custom / No Brand —</option>
                {brands.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}
              </select>
            </div>
            {!logForm.brandId&&(
              <div style={{marginBottom:10}}>
                <VT color="#666" size={13} style={{marginBottom:6}}>TYPE</VT>
                <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                  {TYPES.map(t=>(
                    <button key={t} onClick={()=>setLogForm(p=>({...p,type:t}))}
                      style={{background:logForm.type===t?`${N.pink}22`:'transparent',
                        border:`1px solid ${logForm.type===t?N.pink:'#222'}`,borderRadius:20,
                        padding:'5px 12px',cursor:'pointer',color:logForm.type===t?N.pink:'#555',
                        fontFamily:"'VT323',monospace",fontSize:14}}>{t}</button>
                  ))}
                </div>
              </div>
            )}
            <div style={{display:'flex',gap:8,marginBottom:10}}>
              <div style={{flex:1}}>
                <VT color="#666" size={13} style={{marginBottom:6}}>MG</VT>
                <NInput type="number" color={N.cyan}
                  placeholder={logForm.brandId?String(brands.find(b=>b.id===logForm.brandId)?.mg||''):'e.g. 6'}
                  value={logForm.mg} onChange={e=>setLogForm(p=>({...p,mg:e.target.value}))}/>
              </div>
              <div style={{flex:1}}>
                <VT color="#666" size={13} style={{marginBottom:6}}>COST $</VT>
                <NInput type="number" color={N.yellow}
                  placeholder={logForm.brandId?String(brands.find(b=>b.id===logForm.brandId)?.price_per_unit||''):'0.30'}
                  value={logForm.cost} onChange={e=>setLogForm(p=>({...p,cost:e.target.value}))}/>
              </div>
            </div>
            <NInput placeholder="Note (optional)" value={logForm.note} onChange={e=>setLogForm(p=>({...p,note:e.target.value}))} color={N.purple} style={{marginBottom:16}}/>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setShowLog(false)} style={{flex:1,padding:13,border:'1px solid #333',borderRadius:8,background:'transparent',color:'#666',cursor:'pointer',fontFamily:"'Orbitron',sans-serif",fontSize:13}}>CANCEL</button>
              <button onClick={logUse} style={{flex:2,padding:13,border:`2px solid ${N.pink}`,borderRadius:8,background:`${N.pink}22`,color:N.pink,fontFamily:"'Orbitron',sans-serif",fontSize:14,fontWeight:900,cursor:'pointer',textShadow:glow(N.pink,8),boxShadow:`0 0 15px ${N.pink}44`}}>LOG IT ▶</button>
            </div>
          </div>
        </div>
      )}

      {/* SETTINGS MODAL */}
      {showSettings&&editSettings&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.9)',display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:100}}
          onClick={e=>{if(e.target===e.currentTarget)setShowSettings(false);}}>
          <div style={{background:'#08080f',border:`1px solid ${N.purple}66`,borderRadius:'20px 20px 0 0',
            boxShadow:`0 -10px 40px ${N.purple}22`,padding:'24px 20px 40px',width:'100%',maxWidth:440,animation:'slide-up 0.3s ease'}}>
            <VT color={N.purple} size={13} style={{textShadow:glow(N.purple,6),marginBottom:16}}>SETTINGS</VT>
            {[['DAILY USE GOAL','daily_goal','e.g. 10'],['DAILY SPEND LIMIT ($)','daily_spend_limit','e.g. 5.00'],['INTERVAL BETWEEN USES (MIN)','interval_minutes','e.g. 60']].map(([lbl,key,ph])=>(
              <div key={key} style={{marginBottom:12}}>
                <VT color="#666" size={13} style={{marginBottom:6}}>{lbl}</VT>
                <NInput type="number" placeholder={ph} color={N.purple} value={editSettings[key]||''} onChange={e=>setEditSettings(p=>({...p,[key]:e.target.value}))}/>
              </div>
            ))}
            <div style={{display:'flex',gap:10,marginTop:8,marginBottom:12}}>
              <button onClick={()=>setShowSettings(false)} style={{flex:1,padding:13,border:'1px solid #333',borderRadius:8,background:'transparent',color:'#666',cursor:'pointer',fontFamily:"'Orbitron',sans-serif",fontSize:13}}>CANCEL</button>
              <NBtn onClick={saveSettings} color={N.purple} style={{flex:2}}>SAVE</NBtn>
            </div>
            <div style={{borderTop:'1px solid #1a1a2e',paddingTop:14}}>
              <NBtn onClick={signOut} color={N.pink} full>⏻ SIGN OUT</NBtn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App(){
  const [session,setSession]=useState(undefined);
  const [profile,setProfile]=useState(null);

  const loadProfile=async(session)=>{
    let {data:p}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
    if(!p){
      const pending=localStorage.getItem('hl_pending_username');
      if(pending){
        const {data:np}=await sb.from('profiles').insert({id:session.user.id,username:pending}).select().single();
        p=np;
        localStorage.removeItem('hl_pending_username');
      }
    }
    setProfile(p);
  };

  useEffect(()=>{
    sb.auth.getSession().then(async({data:{session}})=>{
      setSession(session||null);
      if(session)await loadProfile(session);
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange(async(event,session)=>{
      if(event==='INITIAL_SESSION')return;
      setSession(session||null);
      if(session)await loadProfile(session);
      else setProfile(null);
    });
    return()=>subscription.unsubscribe();
  },[]);

  if(session===undefined)return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh'}}>
      <div className="spinner"/>
    </div>
  );
  if(!session)return <AuthScreen/>;
  return <MainApp session={session} profile={profile}/>;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
