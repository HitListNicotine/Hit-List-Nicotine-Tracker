<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>

  <meta name="apple-mobile-web-app-capable" content="yes"/>

  <title>HitList</title>
  <link rel="manifest" href="manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;background:#050508;color:#e8e8f0;font-family:'Orbitron',sans-serif;overflow-x:hidden;}
    input,select,button{font-family:inherit;}
    input::placeholder{color:#444;}
    select option{background:#0f0f1e;}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:#050508;}
    ::-webkit-scrollbar-thumb{background:#2a2a38;border-radius:2px;}

    @keyframes pulse-pink{0%,100%{filter:drop-shadow(0 0 6px #ff2d78) drop-shadow(0 0 18px #ff2d78)}50%{filter:drop-shadow(0 0 12px #ff2d78) drop-shadow(0 0 40px #ff2d78)}}
    @keyframes pulse-green{0%,100%{filter:drop-shadow(0 0 6px #39ff14) drop-shadow(0 0 18px #39ff14)}50%{filter:drop-shadow(0 0 14px #39ff14) drop-shadow(0 0 50px #39ff14)}}
    @keyframes pulse-yellow{0%,100%{filter:drop-shadow(0 0 6px #ffe600) drop-shadow(0 0 18px #ffe600)}50%{filter:drop-shadow(0 0 12px #ffe600) drop-shadow(0 0 40px #ffe600)}}
    @keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-8px)}}
    @keyframes float-ready{0%,100%{transform:translateY(0px) scale(1.01)}33%{transform:translateY(-11px) scale(1.03)}66%{transform:translateY(-5px) scale(1.01)}}
    @keyframes lid-open{0%{transform:rotate(0deg) translateY(0)}100%{transform:rotate(-42deg) translateY(-6px)}}
    @keyframes lid-close{0%{transform:rotate(-42deg) translateY(-6px)}100%{transform:rotate(0deg) translateY(0)}}
    @keyframes smoke-rise{0%{opacity:.7;transform:translateY(0) scaleX(1)}100%{opacity:0;transform:translateY(-28px) scaleX(2.2)}}
    @keyframes sparkle{0%{opacity:0;transform:scale(0) rotate(0deg)}50%{opacity:1;transform:scale(1.3) rotate(180deg)}100%{opacity:0;transform:scale(0) rotate(360deg)}}
    @keyframes slide-up{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
    @keyframes neon-border{0%,100%{box-shadow:0 0 5px #00f5ff,0 0 15px #00f5ff,inset 0 0 5px rgba(0,245,255,.1)}50%{box-shadow:0 0 12px #00f5ff,0 0 32px #00f5ff,0 0 60px #00f5ff,inset 0 0 10px rgba(0,245,255,.2)}}
    @keyframes trophy-bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.18) rotate(-4deg)}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

    .scanlines{background-image:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,245,255,0.012) 3px,rgba(0,245,255,0.012) 4px);}
    .card{background:rgba(0,0,0,0.6);border-radius:12px;padding:14px 16px;margin-bottom:12px;}
    .neon-input{width:100%;background:rgba(0,0,0,0.7);border-radius:8px;color:#e8e8f0;font-size:16px;padding:10px 12px;font-family:'VT323',monospace;outline:none;}
    .tab-btn{flex:1;padding:7px 0;border:none;border-radius:7px;cursor:pointer;background:transparent;color:#444;font-size:9px;font-family:'Orbitron',sans-serif;font-weight:700;letter-spacing:0.5px;transition:all 0.2s;}
    .tab-btn.active{color:#00f5ff;text-shadow:0 0 6px #00f5ff,0 0 12px #00f5ff,0 0 24px #00f5ff;background:rgba(0,245,255,0.12);box-shadow:0 0 8px rgba(0,245,255,0.3);}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;align-items:flex-end;justify-content:center;z-index:100;}
    .modal-sheet{background:#08080f;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:440px;animation:slide-up 0.3s ease;}
    .spinner{width:32px;height:32px;border:3px solid rgba(0,245,255,0.2);border-top-color:#00f5ff;border-radius:50%;animation:spin 0.8s linear infinite;}
  </style>
</head>
<body class="scanlines">
<div id="app" style="display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:16px 16px 90px;"></div>

<script>
const SUPABASE_URL = 'https://nfijpadekyrmudtzlnqu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5maWpwYWRla3lybXVkdHpsbnF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MTUyOTcsImV4cCI6MjA5NDE5MTI5N30.0hrefMd03K-fNU6frpsNB5d1bw-fwvIQQB-RcRvwk8U';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const N = {pink:'#ff2d78',cyan:'#00f5ff',yellow:'#ffe600',green:'#39ff14',purple:'#bf5fff',orange:'#ff6b1a'};
const glow = (c,s=20) => `0 0 ${s/4}px ${c},0 0 ${s}px ${c},0 0 ${s*2}px ${c}`;
const TYPES = ['🚬 Cigarette','💨 Vape','🟤 Pouch','🌿 Dip','⚡ Other'];
const MEDAL = ['🥇','🥈','🥉'];

/* ── state ── */
let STATE = {
  session: null, profile: null, tab: 'today',
  logs: [], brands: [], settings: {daily_goal:10,daily_spend_limit:5,interval_minutes:60},
  timerStart: null, now: Date.now(),
  leaderboard: [], trashTalks: {}, trashInputs: {}, expandedUser: null,
  logForm: {type:TYPES[0],brandId:'',mg:'',cost:'',note:''},
  showLogForm: false, showSettings: false, editSettings: null,
  newBrand: {name:'',mg:'',pricePerUnit:'',type:TYPES[0]},
  authMode: 'signin', authEmail:'', authPassword:'', authUsername:'',
  authError:'', authLoading:false, loading:true, pulse:false,
};

function setState(patch){ Object.assign(STATE, patch); render(); }

/* ── helpers ── */
const todayKey = () => new Date().toISOString().split('T')[0];
const fmtMoney = n => `$${(+n||0).toFixed(2)}`;
const fmtTime  = s => new Date(s).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
const fmtDay   = s => new Date(s+'T12:00:00').toLocaleDateString('en-US',{weekday:'short'});
const getLast7 = () => Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));return d.toISOString().split('T')[0];});

/* ── supabase calls ── */
async function loadUserData(){
  const uid = STATE.session.user.id;
  const [logsRes, brandsRes, settingsRes] = await Promise.all([
    sb.from('logs').select('*').eq('user_id',uid).order('logged_at',{ascending:false}),
    sb.from('brands').select('*').eq('user_id',uid).order('created_at'),
    sb.from('settings').select('*').eq('user_id',uid).single(),
  ]);
  const settings = settingsRes.data || {daily_goal:10,daily_spend_limit:5,interval_minutes:60};
  setState({
    logs: logsRes.data||[],
    brands: brandsRes.data||[],
    settings,
    editSettings: {...settings},
    loading: false,
  });
}

async function loadLeaderboard(){
  const {data} = await sb.from('profiles').select(`
    id, username,
    logs(logged_at, cost, mg),
    settings(daily_goal, daily_spend_limit)
  `);
  if(!data) return;
  const today = todayKey();
  const last7 = getLast7();
  const board = data.map(p=>{
    const todayLogs = (p.logs||[]).filter(l=>l.logged_at.startsWith(today));
    const weekLogs  = (p.logs||[]).filter(l=>last7.some(d=>l.logged_at.startsWith(d)));
    return {
      id: p.id,
      username: p.username,
      todayCount: todayLogs.length,
      todayGoal: p.settings?.daily_goal||10,
      todaySpend: todayLogs.reduce((a,l)=>a+(l.cost||0),0),
      weekTotal: weekLogs.length,
    };
  }).sort((a,b)=>(a.todayCount/(a.todayGoal||10))-(b.todayCount/(b.todayGoal||10)));
  setState({leaderboard: board});
}

async function loadTrashTalks(){
  if(!STATE.profile) return;
  const uid = STATE.profile.id;
  const {data} = await sb.from('trash_talks').select(`
    *,
    from_profile:from_user_id(username),
    to_profile:to_user_id(username)
  `).or(`from_user_id.eq.${uid},to_user_id.eq.${uid}`);
  if(!data) return;
  const map = {};
  data.forEach(t=>{
    const targetUser = t.to_profile?.username;
    if(!map[targetUser] || t.created_at > map[targetUser].created_at){
      map[targetUser] = {from:t.from_profile?.username, text:t.message, created_at:t.created_at};
    }
  });
  setState({trashTalks: map});
}

async function signUp(){
  setState({authLoading:true, authError:''});
  if(!STATE.authUsername.trim()){setState({authError:'Please enter a username',authLoading:false});return;}
  const {data,error} = await sb.auth.signUp({email:STATE.authEmail,password:STATE.authPassword});
  if(error){setState({authError:error.message,authLoading:false});return;}
  if(data.user){
    const {error:pe} = await sb.from('profiles').insert({id:data.user.id,username:STATE.authUsername.trim().toUpperCase()});
    if(pe){setState({authError:'Username taken or invalid',authLoading:false});return;}
  }
  setState({authLoading:false, authError:'Check your email to confirm your account!'});
}

async function signIn(){
  setState({authLoading:true, authError:''});
  const {error} = await sb.auth.signInWithPassword({email:STATE.authEmail,password:STATE.authPassword});
  if(error) setState({authError:error.message,authLoading:false});
}

async function signOut(){
  await sb.auth.signOut();
  setState({session:null,profile:null,logs:[],brands:[],settings:{daily_goal:10,daily_spend_limit:5,interval_minutes:60},showSettings:false});
}

async function logUse(){
  const uid = STATE.session.user.id;
  const brand = STATE.brands.find(b=>b.id===STATE.logForm.brandId);
  const cost = STATE.logForm.cost!==''?+STATE.logForm.cost:brand?brand.price_per_unit:0;
  const mg   = STATE.logForm.mg!==''?+STATE.logForm.mg:brand?brand.mg:null;
  const entry = {
    user_id:uid, logged_at:new Date().toISOString(),
    type:brand?brand.type:STATE.logForm.type,
    brand_name:brand?brand.name:null, mg, cost:+cost||0,
    note:STATE.logForm.note||null,
  };
  const {data} = await sb.from('logs').insert(entry).select().single();
  if(data){
    setState({logs:[data,...STATE.logs], timerStart:Date.now(),
      showLogForm:false, pulse:true,
      logForm:{type:TYPES[0],brandId:'',mg:'',cost:'',note:''}});
    setTimeout(()=>setState({pulse:false}),400);
  }
}

async function undoLast(){
  const todayLogs = STATE.logs.filter(l=>l.logged_at.startsWith(todayKey()));
  if(!todayLogs.length) return;
  const last = todayLogs[0];
  await sb.from('logs').delete().eq('id',last.id);
  setState({logs:STATE.logs.filter(l=>l.id!==last.id)});
}

async function addBrand(){
  if(!STATE.newBrand.name) return;
  const {data} = await sb.from('brands').insert({
    user_id:STATE.session.user.id,
    name:STATE.newBrand.name, mg:+STATE.newBrand.mg||0,
    price_per_unit:+STATE.newBrand.pricePerUnit||0,
    type:STATE.newBrand.type,
  }).select().single();
  if(data){
    setState({brands:[...STATE.brands,data],newBrand:{name:'',mg:'',pricePerUnit:'',type:TYPES[0]}});
  }
}

async function deleteBrand(id){
  await sb.from('brands').delete().eq('id',id);
  setState({brands:STATE.brands.filter(b=>b.id!==id)});
}

async function saveSettings(){
  const uid = STATE.session.user.id;
  const s = {
    user_id:uid,
    daily_goal:+STATE.editSettings.daily_goal||10,
    daily_spend_limit:+STATE.editSettings.daily_spend_limit||0,
    interval_minutes:+STATE.editSettings.interval_minutes||60,
    updated_at:new Date().toISOString(),
  };
  await sb.from('settings').upsert(s);
  setState({settings:s, showSettings:false});
}

async function generateTrashTalk(targetId, targetUsername){
  const myData = STATE.leaderboard.find(p=>p.id===STATE.profile.id);
  const targetData = STATE.leaderboard.find(p=>p.id===targetId);
  if(!targetData) return;
  setState({trashTalks:{...STATE.trashTalks,[targetUsername]:{text:'',loading:true}}});
  try{
    const prompt = `You are a hilarious trash-talking scoreboard announcer for a nicotine reduction app called HITLIST. Generate ONE short savage funny trash talk (max 2 sentences, 80s arcade vibe) from "${STATE.profile.username}" to "${targetUsername}". Stats: ${STATE.profile.username}: ${myData?.todayCount||0}/${myData?.todayGoal||10} uses. ${targetUsername}: ${targetData.todayCount}/${targetData.todayGoal} uses, $${targetData.todaySpend?.toFixed(2)||'0.00'} spent. Context: "${STATE.trashInputs[targetUsername]||'just roast them'}". Rules: fun not mean, reference stats, 80s arcade energy, ALL CAPS key phrases, max 2 sentences.`;
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]}),
    });
    const d = await res.json();
    const text = d.content?.map(c=>c.text||'').join('')||'ROAST.EXE FAILED';
    await sb.from('trash_talks').insert({
      from_user_id:STATE.profile.id, to_user_id:targetId, message:text,
    });
    setState({trashTalks:{...STATE.trashTalks,[targetUsername]:{text,loading:false,from:STATE.profile.username}}});
  }catch{
    setState({trashTalks:{...STATE.trashTalks,[targetUsername]:{text:'SYSTEM ERROR: ROAST.EXE CRASHED',loading:false}}});
  }
}

/* ── render helpers ── */
function card(color, content, style='', animate=false){
  return `<div class="card" style="border:1px solid ${color};box-shadow:0 0 8px ${color}44,inset 0 0 8px ${color}11;${animate?'animation:neon-border 2s ease-in-out infinite;':''}${style}">${content}</div>`;
}
function neonBtn(color, text, onclick, extra=''){
  return `<button onclick="${onclick}" style="background:${color}22;border:2px solid ${color};border-radius:8px;color:${color};font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;padding:11px 20px;cursor:pointer;text-shadow:${glow(color,8)};box-shadow:0 0 8px ${color}44;letter-spacing:1px;transition:all 0.2s;${extra}">${text}</button>`;
}
function neonInput(id, val, placeholder, type='text', color=N.cyan, extra=''){
  return `<input class="neon-input" id="${id}" type="${type}" value="${escHtml(val||'')}" placeholder="${placeholder}" style="border:1px solid ${color}88;box-shadow:0 0 6px ${color}44;caret-color:${color};${extra}"/>`;
}
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function vt(text, color='#888', size=13, extra=''){
  return `<div style="font-family:'VT323',monospace;font-size:${size}px;color:${color};letter-spacing:2px;${extra}">${text}</div>`;
}

/* ── derived today stats ── */
function todayStats(){
  const today = todayKey();
  const todayLogs = STATE.logs.filter(l=>l.logged_at.startsWith(today));
  return {
    todayLogs,
    todayCount: todayLogs.length,
    todaySpend: todayLogs.reduce((a,l)=>a+(l.cost||0),0),
    totalMg: todayLogs.reduce((a,l)=>a+(l.mg||0),0),
    hasMg: todayLogs.some(l=>l.mg),
  };
}

function renderToday(){
  const s = STATE.settings;
  const {todayLogs, todayCount, todaySpend, totalMg, hasMg} = todayStats();
  const pctGoal = Math.min(todayCount/(s.daily_goal||10),1);
  const pctSpend = s.daily_spend_limit>0 ? Math.min(todaySpend/(s.daily_spend_limit),1) : 0;
  const intervalMs = (s.interval_minutes||60)*60*1000;
  const elapsedMs = STATE.timerStart ? STATE.now-STATE.timerStart : intervalMs;
  const remainingMs = Math.max(intervalMs-elapsedMs,0);
  const timerPct = STATE.timerStart ? Math.min(elapsedMs/intervalMs,1) : 1;
  const timerReady = timerPct>=1;
  const timerMins = Math.floor(remainingMs/60000);
  const timerSecs = Math.floor((remainingMs%60000)/1000);
  const timerColor = timerReady?N.green:timerPct>0.6?N.yellow:N.pink;
  const statusColor = todayCount===0?N.green:pctGoal<0.7?N.green:pctGoal<1?N.yellow:N.pink;

  const r = (200-10)/2, circ = 2*Math.PI*r;
  const dash = circ*(1-Math.max(timerPct,0));

  return `
  <div style="animation:slide-up 0.4s ease;width:100%;">
    ${card(timerColor, `
      ${vt('NEXT USE COUNTDOWN', timerColor, 13, `text-shadow:${glow(timerColor,6)};margin-bottom:18px;`)}
      <div style="position:relative;width:210px;height:210px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
        <svg width="210" height="210" style="transform:rotate(-90deg);position:absolute;top:0;left:0;">
          <circle cx="105" cy="105" r="${r}" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="10"/>
          <circle cx="105" cy="105" r="${r}" fill="none" stroke="${timerColor}" stroke-width="10" stroke-linecap="round"
            stroke-dasharray="${circ}" stroke-dashoffset="${dash}"
            style="transition:stroke-dashoffset 1s linear,stroke 0.4s;filter:drop-shadow(0 0 4px ${timerColor}44)"/>
        </svg>
        ${!timerReady ? `<div style="position:absolute;top:14px;left:0;right:0;text-align:center;z-index:2;font-family:'VT323',monospace;font-size:24px;color:${timerColor};text-shadow:${glow(timerColor,8)}">${timerMins}:${String(timerSecs).padStart(2,'0')}</div>` : ''}
        <div style="position:relative;z-index:3;margin-top:16px;">${canSVG(timerReady, timerColor, timerPct)}</div>
      </div>
      ${vt(`INTERVAL: ${s.interval_minutes||60} MIN`,'#444',13,'letter-spacing:2px;')}
    `, 'display:flex;flex-direction:column;align-items:center;padding:24px 16px 20px;')}

    <div style="display:flex;gap:10px;margin-bottom:12px;">
      ${card(statusColor, `
        <div style="font-family:'Orbitron',sans-serif;font-size:46px;font-weight:900;color:${statusColor};text-shadow:${glow(statusColor,20)};line-height:1;">${todayCount}</div>
        ${vt(`OF ${s.daily_goal||10} GOAL`,'#555',14,'margin-top:4px;')}
        <div style="background:rgba(255,255,255,0.05);border-radius:4px;height:5px;margin-top:10px;overflow:hidden;">
          <div style="height:100%;border-radius:4px;width:${pctGoal*100}%;background:${statusColor};box-shadow:0 0 8px ${statusColor};transition:width 0.4s;"></div>
        </div>
      `, 'flex:1;text-align:center;margin-bottom:0;')}
      ${card(pctSpend>=1?N.pink:N.yellow, `
        <div style="font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;color:${pctSpend>=1?N.pink:N.yellow};text-shadow:${glow(pctSpend>=1?N.pink:N.yellow,15)};line-height:1;">${fmtMoney(todaySpend)}</div>
        ${vt(s.daily_spend_limit>0?`OF ${fmtMoney(s.daily_spend_limit)}`:'SPENT','#555',14,'margin-top:4px;')}
        ${s.daily_spend_limit>0?`<div style="background:rgba(255,255,255,0.05);border-radius:4px;height:5px;margin-top:10px;overflow:hidden;"><div style="height:100%;border-radius:4px;width:${pctSpend*100}%;background:${pctSpend>=1?N.pink:N.yellow};transition:width 0.4s;"></div></div>`:''}
      `, 'flex:1;text-align:center;margin-bottom:0;')}
    </div>

    ${hasMg ? card(N.purple, `
      <div style="display:flex;justify-content:space-between;align-items:center;">
        ${vt('TOTAL NICOTINE','#888',15)}
        <div style="font-family:'Orbitron',sans-serif;font-size:20px;font-weight:700;color:${N.purple};text-shadow:${glow(N.purple,10)}">${totalMg} mg</div>
      </div>`) : ''}

    <button onclick="setState({showLogForm:true})" style="width:100%;padding:18px;border:2px solid ${N.pink};border-radius:12px;background:${STATE.pulse?N.pink+'33':N.pink+'11'};color:${N.pink};font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;cursor:pointer;letter-spacing:2px;text-shadow:${glow(N.pink,10)};box-shadow:0 0 20px ${N.pink}44,inset 0 0 20px ${N.pink}11;transform:${STATE.pulse?'scale(0.97)':'scale(1)'};transition:all 0.15s;margin-bottom:10px;">+ LOG A USE</button>
    ${todayLogs.length>0 ? `<button onclick="undoLast()" style="width:100%;padding:10px;border:1px solid #333;border-radius:8px;background:transparent;color:#666;font-family:'Orbitron',sans-serif;font-size:13px;cursor:pointer;">↩ UNDO LAST</button>` : ''}
  </div>`;
}

function renderWeek(){
  const days = getLast7();
  const today = todayKey();
  const s = STATE.settings;
  const max7 = Math.max(...days.map(d=>STATE.logs.filter(l=>l.logged_at.startsWith(d)).length), s.daily_goal||10, 1);
  const maxSpend = Math.max(...days.map(d=>STATE.logs.filter(l=>l.logged_at.startsWith(d)).reduce((a,l)=>a+(l.cost||0),0)), s.daily_spend_limit||0, 0.01);
  const totals = {
    uses: days.reduce((a,d)=>a+STATE.logs.filter(l=>l.logged_at.startsWith(d)).length,0),
    mg:   days.reduce((a,d)=>a+STATE.logs.filter(l=>l.logged_at.startsWith(d)).reduce((b,l)=>b+(l.mg||0),0),0),
    spend:days.reduce((a,d)=>a+STATE.logs.filter(l=>l.logged_at.startsWith(d)).reduce((b,l)=>b+(l.cost||0),0),0),
  };

  const useBars = days.map(d=>{
    const cnt = STATE.logs.filter(l=>l.logged_at.startsWith(d)).length;
    const h = cnt===0?4:Math.round((cnt/max7)*110);
    const over = cnt>(s.daily_goal||10);
    const col = cnt===0?'#1a1a2e':over?N.pink:d===today?N.green:N.cyan;
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
      <div style="font-size:10px;color:${col};font-family:'VT323',monospace">${cnt||''}</div>
      <div style="width:100%;height:${h}px;border-radius:4px 4px 0 0;background:${col};box-shadow:0 0 8px ${col}88;transition:height 0.5s;"></div>
    </div>`;
  }).join('');

  const spendBars = days.map(d=>{
    const sp = STATE.logs.filter(l=>l.logged_at.startsWith(d)).reduce((a,l)=>a+(l.cost||0),0);
    const h = sp===0?4:Math.round((sp/maxSpend)*60);
    const over = s.daily_spend_limit>0&&sp>s.daily_spend_limit;
    const col = sp===0?'#1a1a2e':over?N.pink:d===today?N.yellow:N.orange;
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;">
      <div style="font-size:9px;color:${col};font-family:'VT323',monospace">${sp>0?'$'+sp.toFixed(1):''}</div>
      <div style="width:100%;height:${h}px;border-radius:4px 4px 0 0;background:${col};box-shadow:0 0 6px ${col}88;"></div>
    </div>`;
  }).join('');

  const dayLabels = days.map(d=>`<div style="flex:1;text-align:center;font-size:10px;font-family:'VT323',monospace;letter-spacing:1px;color:${d===today?'#e8e8f0':'#444'}">${fmtDay(d)}</div>`).join('');

  return `<div style="animation:slide-up 0.4s ease;width:100%;">
    ${card(N.cyan, `
      ${vt('USES — LAST 7 DAYS',N.cyan,13,`text-shadow:${glow(N.cyan,6)};margin-bottom:16px;`)}
      <div style="display:flex;gap:6px;align-items:flex-end;height:120px;margin-bottom:8px;">${useBars}</div>
      <div style="display:flex;gap:6px;margin-bottom:20px;">${dayLabels}</div>
      ${vt('SPEND — LAST 7 DAYS',N.yellow,13,`text-shadow:${glow(N.yellow,6)};margin-bottom:12px;`)}
      <div style="display:flex;gap:6px;align-items:flex-end;height:70px;margin-bottom:8px;">${spendBars}</div>
      <div style="border-top:1px solid ${N.cyan}33;padding-top:16px;margin-top:8px;display:flex;justify-content:space-between;text-align:center;">
        ${[[`USES`,totals.uses,N.cyan],[`AVG`,(totals.uses/7).toFixed(1),N.purple],[`MG`,totals.mg,N.green],[`$`,fmtMoney(totals.spend),N.yellow]]
          .map(([l,v,c])=>`<div><div style="font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;color:${c};text-shadow:${glow(c,8)}">${v}</div>${vt(l,'#555',12)}</div>`).join('')}
      </div>
    `)}
  </div>`;
}

                    <div style="font-family:'VT323',monospace;font-size:16px;color:#e8e8f0;line-height:1.5">${escHtml(talk.text)}</div>
                  </div>`
                  : `<div style="font-family:'VT323',monospace;font-size:14px;color:#333;text-align:center;letter-spacing:2px;">NO ROASTS YET... YOU'RE SAFE</div>`}
              `}
            </div>` : '';

          return card(isMe?N.pink:rankColor, `
            <div style="display:flex;align-items:center;gap:12px;cursor:pointer;" onclick="setState({expandedUser:STATE.expandedUser==='${p.username}'?null:'${p.username}'})">
              <div style="font-family:'Orbitron',sans-serif;font-size:20px;color:${rankColor};text-shadow:${glow(rankColor,10)};min-width:32px;text-align:center;${i===0?'animation:trophy-bounce 2s ease-in-out infinite;':''}">${i<3?MEDAL[i]:`#${i+1}`}</div>
              <div style="flex:1;">
                <div style="display:flex;align-items:center;gap:8px;">
                  <div style="font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:${isMe?N.pink:'#e8e8f0'};text-shadow:${isMe?glow(N.pink,8):'none'}">${escHtml(p.username)}</div>
                  ${isMe?`<div style="font-family:'VT323',monospace;font-size:11px;color:${N.pink};border:1px solid ${N.pink}66;border-radius:4px;padding:1px 5px;text-shadow:${glow(N.pink,4)}">YOU</div>`:''}
                </div>
                <div style="background:rgba(255,255,255,0.05);border-radius:3px;height:4px;margin-top:6px;overflow:hidden;max-width:160px;">
                  <div style="height:100%;border-radius:3px;width:${Math.min(pct,1)*100}%;background:${statusCol};box-shadow:0 0 6px ${statusCol};transition:width 0.4s;"></div>
                </div>
                <div style="font-family:'VT323',monospace;font-size:12px;color:#555;margin-top:3px">${p.todayCount}/${p.todayGoal} today · ${p.weekTotal} this week</div>
              </div>
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
                <div style="font-family:'VT323',monospace;font-size:12px;color:${statusCol};text-shadow:${glow(statusCol,4)};letter-spacing:1px">${statusTxt}</div>
                <div style="font-family:'VT323',monospace;font-size:11px;color:#444">${isExpanded?'▲ CLOSE':'▼ TRASH TALK'}</div>
              </div>
            </div>
            ${expandedPanel}
          `, '', isMe);
        }).join('')}
  </div>`;
}

function renderLogForm(){
  const f = STATE.logForm;
  const brand = STATE.brands.find(b=>b.id===f.brandId);
  return `<div class="modal-overlay" onclick="if(event.target===this)setState({showLogForm:false})">
    <div class="modal-sheet" style="border:1px solid ${N.pink}66;box-shadow:0 -10px 40px ${N.pink}22;">
      ${vt('LOG A USE',N.pink,13,`text-shadow:${glow(N.pink,6)};margin-bottom:16px;`)}
      <div style="margin-bottom:10px;">
        ${vt('BRAND','#666',13,'margin-bottom:6px;')}
        <select id="lf-brand" style="width:100%;background:rgba(0,0,0,0.8);border:1px solid ${N.pink}66;border-radius:8px;color:#e8e8f0;font-size:16px;padding:10px 12px;font-family:'VT323',monospace;outline:none;" onchange="updateLogFormBrand(this.value)">
          <option value="">— Custom / No Brand —</option>
          ${STATE.brands.map(b=>`<option value="${b.id}" ${f.brandId===b.id?'selected':''}>${escHtml(b.name)}</option>`).join('')}
        </select>
      </div>
      ${!f.brandId ? `
        <div style="margin-bottom:10px;">
          ${vt('TYPE','#666',13,'margin-bottom:6px;')}
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            ${TYPES.map(t=>`<button onclick="setState({logForm:{...STATE.logForm,type:'${t}'}})" style="background:${f.type===t?N.pink+'22':'transparent'};border:1px solid ${f.type===t?N.pink:'#222'};border-radius:20px;padding:5px 12px;cursor:pointer;color:${f.type===t?N.pink:'#555'};font-family:'VT323',monospace;font-size:14px;">${t}</button>`).join('')}
          </div>
        </div>` : ''}
      <div style="display:flex;gap:8px;margin-bottom:10px;">
        <div style="flex:1">${vt('MG','#666',13,'margin-bottom:6px;')}${neonInput('lf-mg',f.mg,brand?String(brand.mg||''):'e.g. 6','number',N.cyan)}</div>
        <div style="flex:1">${vt('COST $','#666',13,'margin-bottom:6px;')}${neonInput('lf-cost',f.cost,brand?String(brand.price_per_unit||''):'0.30','number',N.yellow)}</div>
      </div>
      ${neonInput('lf-note',f.note,'Note (optional)','text',N.purple,'margin-bottom:16px;')}
      <div style="display:flex;gap:10px;">
        <button onclick="setState({showLogForm:false})" style="flex:1;padding:13px;border:1px solid #333;border-radius:8px;background:transparent;color:#666;font-family:'Orbitron',sans-serif;font-size:13px;cursor:pointer;">CANCEL</button>
        <button onclick="collectAndLog()" style="flex:2;padding:13px;border:2px solid ${N.pink};border-radius:8px;background:${N.pink}22;color:${N.pink};font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;cursor:pointer;text-shadow:${glow(N.pink,8)};box-shadow:0 0 15px ${N.pink}44;">LOG IT ▶</button>
      </div>
    </div>
  </div>`;
}

function renderSettingsForm(){
  const e = STATE.editSettings||STATE.settings;
  return `<div class="modal-overlay" onclick="if(event.target===this)setState({showSettings:false})">
    <div class="modal-sheet" style="border:1px solid ${N.purple}66;box-shadow:0 -10px 40px ${N.purple}22;">
      ${vt('SETTINGS',N.purple,13,`text-shadow:${glow(N.purple,6)};margin-bottom:16px;`)}
      ${[['DAILY USE GOAL','daily_goal','e.g. 10'],['DAILY SPEND LIMIT ($)','daily_spend_limit','e.g. 5.00'],['INTERVAL BETWEEN USES (MIN)','interval_minutes','e.g. 60']]
        .map(([lbl,key,ph])=>`
          <div style="margin-bottom:12px;">
            ${vt(lbl,'#666',13,'margin-bottom:6px;')}
            <input class="neon-input" id="es-${key}" type="number" value="${e[key]||''}" placeholder="${ph}" style="border:1px solid ${N.purple}88;box-shadow:0 0 6px ${N.purple}44;caret-color:${N.purple};"/>
          </div>`).join('')}
      <div style="display:flex;gap:10px;margin-top:8px;margin-bottom:12px;">
        <button onclick="setState({showSettings:false})" style="flex:1;padding:13px;border:1px solid #333;border-radius:8px;background:transparent;color:#666;font-family:'Orbitron',sans-serif;font-size:13px;cursor:pointer;">CANCEL</button>
        ${neonBtn(N.purple,'SAVE','collectAndSaveSettings()','flex:2;')}
      </div>
      <div style="border-top:1px solid #1a1a2e;padding-top:14px;">
        ${neonBtn(N.pink,'⏻ SIGN OUT','signOut()','width:100%;')}
      </div>
    </div>
  </div>`;
}

/* ── collect form values before actions ── */
function collectAndLog(){
  const mg   = document.getElementById('lf-mg')?.value;
  const cost = document.getElementById('lf-cost')?.value;
  const note = document.getElementById('lf-note')?.value;
  STATE.logForm = {...STATE.logForm, mg, cost, note};
  logUse();
}
function saveBrand(){
  STATE.newBrand = {
    name: document.getElementById('nb-name')?.value||'',
    mg:   document.getElementById('nb-mg')?.value||'',
    pricePerUnit: document.getElementById('nb-price')?.value||'',
    type: document.getElementById('nb-type')?.value||TYPES[0],
  };
  addBrand();
}
function collectAndSaveSettings(){
  STATE.editSettings = {
    daily_goal:       document.getElementById('es-daily_goal')?.value,
    daily_spend_limit:document.getElementById('es-daily_spend_limit')?.value,
    interval_minutes: document.getElementById('es-interval_minutes')?.value,
  };
  saveSettings();
}
function updateLogFormBrand(val){
  setState({logForm:{...STATE.logForm, brandId:val}});
}

/* ── main render ── */
let _authRendered = false;

function render(){
  const app = document.getElementById('app');
  if(!app) return;

  if(STATE.loading){
    app.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;"><div class="spinner"></div></div>`;
    _authRendered = false;
    return;
  }

  if(!STATE.session){
    app.style.padding = '0';
    if(!_authRendered){
      app.innerHTML = renderAuth();
      _authRendered = true;
      document.getElementById('auth-email')?.addEventListener('input', e=>{ STATE.authEmail=e.target.value; });
      document.getElementById('auth-password')?.addEventListener('input', e=>{ STATE.authPassword=e.target.value; });
      document.getElementById('auth-username')?.addEventListener('input', e=>{ STATE.authUsername=e.target.value; });
    } else {
      const errEl = document.getElementById('auth-error');
      const btnEl = document.getElementById('auth-submit');
      if(errEl) errEl.innerHTML = STATE.authError
        ? `<div style="font-family:'VT323',monospace;font-size:15px;color:${STATE.authError.includes('Check')?N.green:N.pink};margin-bottom:12px;text-align:center;">${STATE.authError}</div>` : '';
      if(btnEl){
        if(STATE.authLoading){
          btnEl.innerHTML = `<div style="display:flex;justify-content:center;padding:12px;"><div class="spinner"></div></div>`;
        } else {
          btnEl.innerHTML = `<button onclick="${STATE.authMode==='signup'?'signUp()':'signIn()'}" style="width:100%;background:${N.pink}22;border:2px solid ${N.pink};border-radius:8px;color:${N.pink};font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;padding:11px 20px;cursor:pointer;text-shadow:${glow(N.pink,8)};box-shadow:0 0 8px ${N.pink}44;letter-spacing:1px;">${STATE.authMode==='signup'?'CREATE ACCOUNT →':'ENTER THE GRID →'}</button>`;
        }
      }
    }
    return;
  }

  _authRendered = false;

  app.style.padding = '16px 16px 90px';

  const TABS = [{id:'today',label:'TODAY'},{id:'week',label:'WEEK'},{id:'log',label:'LOG'},{id:'brands',label:'GEAR'},{id:'crew',label:'CREW'}];

  let tabContent = '';
  if(STATE.tab==='today')  tabContent = renderToday();
  if(STATE.tab==='week')   tabContent = renderWeek();
  if(STATE.tab==='log')    tabContent = renderLog();
  if(STATE.tab==='brands') tabContent = renderGear();
  if(STATE.tab==='crew')   tabContent = renderCrew();

  app.innerHTML = `
    <div style="width:100%;max-width:420px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <div>
        <div style="font-size:28px;font-weight:900;color:${N.pink};line-height:1;">
          HIT<span style="color:${N.cyan}">LIST</span>
        </div>
        <div style="font-family:'VT323',monospace;font-size:14px;color:${N.yellow};text-shadow:${glow(N.yellow,6)};letter-spacing:3px;margin-top:2px;">${escHtml(STATE.profile?.username||'')} ▮</div>
      </div>
      <button onclick="setState({showSettings:true,editSettings:{...STATE.settings}})" style="background:transparent;border:1px solid ${N.purple}66;border-radius:8px;color:${N.purple};padding:8px 10px;cursor:pointer;font-size:16px;text-shadow:${glow(N.purple,6)};box-shadow:0 0 8px ${N.purple}44;">⚙</button>
    </div>

    <div style="display:flex;gap:4px;background:rgba(0,0,0,0.6);border:1px solid ${N.cyan}33;border-radius:10px;padding:4px;margin-bottom:20px;width:100%;max-width:420px;">
      ${TABS.map(t=>`<button class="tab-btn ${STATE.tab===t.id?'active':''}" onclick="setState({tab:'${t.id}'})">${t.label}</button>`).join('')}
    </div>

    <div style="width:100%;max-width:420px;">
      ${tabContent}
    </div>

    ${STATE.showLogForm  ? renderLogForm()     : ''}
    ${STATE.showSettings ? renderSettingsForm(): ''}
  `;
}

/* ── timer tick — only fires when logged in ── */
setInterval(()=>{ if(STATE.session){ STATE.now = Date.now(); render(); } }, 1000);

/* ── auth listener ── */
sb.auth.onAuthStateChange(async(event, session)=>{
  STATE.session = session;
  if(session){
    const {data:profile} = await sb.from('profiles').select('*').eq('id',session.user.id).single();
    STATE.profile = profile;
    await loadUserData();
  } else {
    setState({loading:false});
  }
});
</script>
</body>
</html>
